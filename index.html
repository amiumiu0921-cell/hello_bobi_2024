<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>波比保佑籤 🐾 毛孩月運勢</title>
<meta property="og:title" content="波比保佑籤 🐾">
<meta property="og:description" content="毛孩每月小運勢 × 飼主陪伴提醒 × 可愛儀式感">
<meta name="theme-color" content="#fdfcf8">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fdfcf8;
    --surface: #f5f3ee;
    --card: #ffffff;
    --border: rgba(0,0,0,0.09);
    --border-mid: rgba(0,0,0,0.15);
    --text: #1a1a18;
    --muted: #6b6b67;
    --hint: #a0a09c;
    --accent: #b5722a;
    --radius-md: 10px;
    --radius-lg: 16px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #181714;
      --surface: #222118;
      --card: #242320;
      --border: rgba(255,255,255,0.09);
      --border-mid: rgba(255,255,255,0.18);
      --text: #ededea;
      --muted: #a0a09c;
      --hint: #6b6b67;
      --accent: #d4924a;
    }
  }

  body {
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container { max-width: 480px; margin: 0 auto; }

  /* ── Header ── */
  .header { text-align: center; margin-bottom: 2rem; }
  .brand-label { font-size: 12px; letter-spacing: 0.12em; color: var(--hint); margin-bottom: 6px; text-transform: uppercase; }
  .brand-name  { font-size: 28px; font-weight: 600; color: var(--text); }
  .brand-sub   { font-size: 13px; color: var(--muted); margin-top: 8px; line-height: 1.7; }

  /* ── Animal picker ── */
  .section-label { font-size: 12px; color: var(--hint); text-align: center; margin-bottom: 10px; letter-spacing: 0.04em; }
  .animal-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 1.75rem; }
  .animal-btn {
    padding: 7px 18px; font-size: 14px; border-radius: 999px;
    border: 1px solid var(--border-mid); background: transparent;
    color: var(--muted); cursor: pointer; transition: all 0.15s;
  }
  .animal-btn.active {
    border-color: var(--accent); color: var(--accent);
    background: rgba(181,114,42,0.07);
  }

  /* ── Jar ── */
  .jar-wrap { text-align: center; margin-bottom: 1.5rem; }
  .jar {
    display: inline-flex; align-items: center; justify-content: center;
    width: 100px; height: 100px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border-mid);
    font-size: 48px; cursor: pointer;
    animation: float 3s ease-in-out infinite;
    transition: transform 0.15s;
    user-select: none;
  }
  .jar:active { transform: scale(0.94); }
  .jar.shake { animation: shake 0.55s ease, float 3s ease-in-out 0.6s infinite; }

  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  @keyframes shake { 0%,100%{transform:rotate(0)} 20%{transform:rotate(-9deg)} 40%{transform:rotate(9deg)} 60%{transform:rotate(-5deg)} 80%{transform:rotate(5deg)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes flicker { 0%,100%{opacity:1} 50%{opacity:.8} }

  .jar-hint { font-size: 13px; color: var(--hint); margin-top: 10px; }

  /* ── Draw button ── */
  .draw-btn {
    display: block; width: 100%; max-width: 320px; margin: 0 auto 2rem;
    padding: 14px 0; font-size: 15px; font-weight: 500;
    border: 1px solid var(--border-mid); border-radius: var(--radius-lg);
    background: transparent; color: var(--text); cursor: pointer;
    letter-spacing: 0.04em; transition: background 0.15s, transform 0.1s;
  }
  .draw-btn:hover { background: var(--surface); }
  .draw-btn:active { transform: scale(0.98); }

  /* ── Card ── */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.5rem 1.25rem;
    margin-bottom: 1rem; animation: fadeUp 0.45s ease forwards;
  }
  .card:nth-child(2) { animation-delay: 0.1s; opacity: 0; }
  .card:nth-child(3) { animation-delay: 0.2s; opacity: 0; }

  /* ── Fortune header ── */
  .fortune-top { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .badge {
    font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 999px;
  }
  .badge-great { background: #fef3c7; color: #92400e; }
  .badge-good  { background: #d1fae5; color: #065f46; }
  .badge-mid   { background: #dbeafe; color: #1e40af; }
  .badge-low   { background: var(--surface); color: var(--muted); }
  .fortune-no  { font-size: 12px; color: var(--hint); margin-left: auto; }

  .fortune-title { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .fortune-meta  { font-size: 13px; color: var(--muted); margin-bottom: 1.25rem; }

  /* ── Poem ── */
  .poem {
    border-left: 2px solid var(--border-mid);
    padding: 0.75rem 1rem; margin-bottom: 1.25rem;
    font-size: 14px; line-height: 2.1; color: var(--muted);
    font-style: italic;
  }

  /* ── Sections ── */
  .sec-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--hint); text-transform: uppercase; margin-bottom: 6px; }
  .body-text  { font-size: 14px; line-height: 1.85; color: var(--text); margin-bottom: 1.1rem; }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; }
  .tag  { font-size: 12px; padding: 4px 12px; border: 1px solid var(--border-mid); border-radius: 999px; color: var(--muted); }

  .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }

  /* ── Ritual block ── */
  .ritual {
    background: var(--surface); border-radius: var(--radius-md);
    padding: 1rem 1.1rem; margin-bottom: 1rem;
  }
  .ritual-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
  .ritual-text  { font-size: 13px; color: var(--muted); line-height: 1.75; }

  /* ── Companion ── */
  .companion { display: flex; gap: 10px; align-items: flex-start; }
  .companion-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
  .companion-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
  .companion-body  { font-size: 13px; color: var(--muted); line-height: 1.75; }

  /* ── Product card ── */
  .product-note { font-size: 12px; color: var(--hint); margin-top: 8px; }

  /* ── CTA row ── */
  .cta-row { display: flex; gap: 8px; margin-top: 0.25rem; }
  .cta-btn {
    flex: 1; padding: 11px 0; font-size: 13px;
    border: 1px solid var(--border-mid); border-radius: var(--radius-md);
    background: transparent; color: var(--muted); cursor: pointer;
    transition: background 0.15s;
  }
  .cta-btn:hover { background: var(--surface); color: var(--text); }

  /* ── Footer ── */
  .footer { text-align: center; margin-top: 2.5rem; font-size: 12px; color: var(--hint); line-height: 2; }
  .footer a { color: var(--accent); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="brand-label">🐾 BOBI 波比</div>
    <div class="brand-name">波比保佑籤</div>
    <div class="brand-sub">毛孩每月小運勢 × 飼主陪伴提醒 × 可愛儀式感</div>
  </div>

  <!-- Pre-draw -->
  <div id="pre-draw">
    <div class="section-label">你家毛孩是？</div>
    <div class="animal-row">
      <button class="animal-btn active" onclick="pick(this,'🐶','狗主子')">🐶 狗狗</button>
      <button class="animal-btn" onclick="pick(this,'🐱','貓主子')">🐱 貓貓</button>
      <button class="animal-btn" onclick="pick(this,'🐰','兔兔')">🐰 兔兔</button>
      <button class="animal-btn" onclick="pick(this,'🐹','鼠鼠')">🐹 鼠鼠</button>
    </div>

    <div class="jar-wrap">
      <div class="jar" id="jar" onclick="draw()">🏮</div>
      <div class="jar-hint">點我搖一搖</div>
    </div>

    <button class="draw-btn" onclick="draw()">求本月波比保佑籤</button>
  </div>

  <!-- Result -->
  <div id="result" class="hidden"></div>

  <!-- Footer -->
  <div class="footer">
    © 波比寵物 BOBI PET<br>
    蝦皮搜尋「波比寵物」找到我們 🛍<br>
    <!-- 換成你的 IG 連結 -->
    <a href="https://instagram.com/" target="_blank">追蹤 IG @bobi_pet</a>
  </div>
</div>

<script>
const ANIMALS = { emoji: '🐶', label: '狗主子' };
let animal = { ...ANIMALS };

function pick(btn, emoji, label) {
  document.querySelectorAll('.animal-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  animal = { emoji, label };
}

const FORTUNES = [
  {
    level:'大吉', badge:'badge-great', emoji:'🌟', no:'第一籤',
    title:'春風得意籤', subtitle:'萬事皆宜，毛孩心花開',
    poem:['春風輕拂暖融融，','毛孩今月運勢濃，','出行玩耍皆順意，','主人陪伴笑聲中。'],
    fortune:'本月毛孩狀態滿點！活力充沛，正是嘗試新事物的好時機。無論是換新玩具、調整飲食，還是報名訓練課程，這個月都特別適合。',
    tags:['外出散步','新玩具','訓練課','健檢'],
    ritual:{ title:'🕯 本月儀式感任務', text:'帶毛孩去一個從沒去過的公園，拍一張牠探索新地方的照片。這張照片未來你會很感動。' },
    companion:{ title:'飼主陪伴提醒', text:'你的毛孩最近很想跟你說話。今天試著坐在牠旁邊，什麼都不做，就靜靜陪五分鐘。' },
    items:['牽繩','胸背帶']
  },
  {
    level:'中吉', badge:'badge-good', emoji:'🌿', no:'第八籤',
    title:'靜好平安籤', subtitle:'平穩踏實，細水長流',
    poem:['綠葉輕搖映日光，','平靜之中有吉祥，','毛孩乖巧待主旁，','居家安樂好時光。'],
    fortune:'這個月是沉澱的好時機。毛孩狀態平穩，適合建立新的日常習慣。居家環境的小升級，會讓牠格外有安全感。',
    tags:['居家舒適','習慣養成','環境升級'],
    ritual:{ title:'🕯 本月儀式感任務', text:'為毛孩的休息角落換一個舒適的新墊子或玩具，讓牠知道家永遠是最棒的地方。' },
    companion:{ title:'飼主陪伴提醒', text:'最近你可能有點忙，毛孩在默默等你。今晚早點回家，陪牠玩十分鐘，這比任何禮物都重要。' },
    items:['尿布墊','居家用品']
  },
  {
    level:'小吉', badge:'badge-mid', emoji:'🌸', no:'第十五籤',
    title:'溫柔守護籤', subtitle:'需要多一點關愛',
    poem:['花開半朵最溫柔，','慢慢來才是節奏，','毛孩需要你的手，','輕聲細語解憂愁。'],
    fortune:'本月毛孩情緒較為敏感，可能比平時更黏人，或有些不尋常的行為。不用擔心，多一點耐心就好，記得留意牠的狀態。',
    tags:['情緒照護','健康觀察','老年護理'],
    ritual:{ title:'🕯 本月儀式感任務', text:'今天多摸摸牠，用你的聲音安慰牠。如果牠年紀大了，考慮給牠一件舒適的護具，讓行動更輕鬆。' },
    companion:{ title:'飼主陪伴提醒', text:'毛孩年紀漸長，每一天都是禮物。今天多花一點時間好好觀察牠，記錄下牠可愛的模樣。' },
    items:['老年護具','頭套']
  },
  {
    level:'末吉', badge:'badge-low', emoji:'🌙', no:'第二十三籤',
    title:'靜待花開籤', subtitle:'轉機就在下個轉角',
    poem:['月圓之前有黑暗，','靜心等待自然安，','毛孩身旁你不離，','好運不遠在眼前。'],
    fortune:'這個月可能有點小波折，但都是暫時的。注意毛孩的飲食和作息，有任何異狀不要拖，及早確認才安心。',
    tags:['健康注意','飲食調整','定期健檢'],
    ritual:{ title:'🕯 本月儀式感任務', text:'帶毛孩去做一次健康檢查，或者更新牠的玩具，給牠一點新鮮感和活力。' },
    companion:{ title:'飼主陪伴提醒', text:'你也辛苦了。陪伴毛孩的同時，也別忘了照顧自己。你狀態好，牠才安心。' },
    items:['玩具','居家用品']
  }
];

function draw() {
  const jar = document.getElementById('jar');
  jar.classList.remove('shake');
  void jar.offsetWidth;
  jar.classList.add('shake');
  setTimeout(() => {
    const f = FORTUNES[Math.floor(Math.random() * FORTUNES.length)];
    showResult(f);
  }, 650);
}

function showResult(f) {
  document.getElementById('pre-draw').classList.add('hidden');
  const el = document.getElementById('result');
  el.classList.remove('hidden');
  el.innerHTML = `
    <div class="card">
      <div class="fortune-top">
        <span class="badge ${f.badge}">${f.emoji} ${f.level}</span>
        <span class="fortune-no">${f.no}</span>
      </div>
      <div class="fortune-title">${f.title}</div>
      <div class="fortune-meta">${animal.emoji} ${animal.label} · ${f.subtitle}</div>
      <div class="poem">${f.poem.map(l=>`<div>${l}</div>`).join('')}</div>
      <div class="sec-label">本月運勢</div>
      <div class="body-text">${f.fortune}</div>
      <div class="sec-label">適合關注</div>
      <div class="tags">${f.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div class="divider"></div>
      <div class="ritual">
        <div class="ritual-title">${f.ritual.title}</div>
        <div class="ritual-text">${f.ritual.text}</div>
      </div>
      <div class="divider"></div>
      <div class="companion">
        <div class="companion-icon">💌</div>
        <div>
          <div class="companion-title">${f.companion.title}</div>
          <div class="companion-body">${f.companion.text}</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="sec-label">波比推薦本月好物</div>
      <div class="body-text" style="margin-bottom:0.75rem">根據這個月的籤，特別適合留意：</div>
      <div class="tags">${f.items.map(t=>`<span class="tag">🛍 ${t}</span>`).join('')}</div>
      <div class="product-note">蝦皮搜尋「波比寵物」即可找到 ✨</div>
    </div>

    <div class="card">
      <div class="cta-row">
        <button class="cta-btn" onclick="reset()">↺ 再求一籤</button>
        <button class="cta-btn" onclick="shareResult('${f.title}','${f.level}')">分享給朋友 ↗</button>
      </div>
    </div>
  `;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function reset() {
  document.getElementById('pre-draw').classList.remove('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('result').innerHTML = '';
}

function shareResult(title, level) {
  const text = `我剛剛幫毛孩求了「波比保佑籤」🏮\n抽到「${title}」— ${level}！\n\n快來幫你家毛孩也求一籤 👇`;
  if (navigator.share) {
    navigator.share({ title: '波比保佑籤', text, url: location.href });
  } else {
    navigator.clipboard.writeText(text + '\n' + location.href)
      .then(() => alert('已複製分享文字！貼到 IG 限動或 Threads 吧 🐾'));
  }
}
</script>
</body>
</html>
